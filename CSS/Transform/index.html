<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .box {
    width: 100%;
    height: 100vh;
    display: flex;
    margin: 12px 40px;
    border: 1px solid #131010;
    display: flex;
    align-items: center;
    justify-content: space-evenly;
  }

  .inside-box {
    width: 200px;
    height: 200px;
    background-color: #131010;
    margin: 30px;
    color: #f8f8f8;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .inside-box:nth-child(1) {
    background-color: aqua;
  }

  .inside-box.rotate {
    transition: 0.5s ease-in-out;
  }

  .inside-box.rotate:hover {
    transform: rotate(360deg);
    border-radius: 50%;
  }

  .inside-box.scale {
    transition: 0.3s;
  }

  .inside-box.scale:hover {
    transform: scaleY(1.4);
  }

  .inside-box:nth-child(3) {
    background-color: tomato;
    transition: 0.3s;
  }

  .inside-box:nth-child(3):hover {
    transform: skewX(9deg);
  }

  .inside-box:nth-child(4) {
    background-color: #252525;
    transition: 0.3s;
  }

  .inside-box:nth-child(4):hover {
    transform: translateX(10%);
  }
</style>

<body>
  <div class="box">
    <div class="inside-box rotate">Rotate</div>
    <div class="inside-box scale">Scale</div>
    <div class="inside-box skew">Skew</div>
    <div class="inside-box translate">Translate</div>
  </div>
</body>

</html>
